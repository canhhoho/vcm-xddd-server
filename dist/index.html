<!DOCTYPE html>
<html lang="vi">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCM Construction Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Load XLSX from CDN for Export functionality -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script type="module" crossorigin src="/assets/index-CTAikWab.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-D5aE_hOo.css">
</head>

<body>
  <div id="error-display" style="display:none; color:red; padding:20px; font-family:monospace;"></div>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      var display = document.getElementById('error-display');
      display.style.display = 'block';
      display.innerHTML += '<div>Error: ' + message + ' at ' + source + ':' + lineno + '</div>';
    };
  </script>
  <div id="root">
    <style>
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f8fafc;
        flex-direction: column;
        font-family: 'Inter', sans-serif;
      }

      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E2E8F0;
        border-top: 3px solid #E11D2E;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }

      .app-loading-text {
        color: #64748B;
        font-size: 14px;
        font-weight: 500;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <div class="app-loading">
      <div class="app-loading-spinner"></div>
      <div class="app-loading-text">VCM Construction Management...</div>
    </div>
  </div>
</body>

</html>
